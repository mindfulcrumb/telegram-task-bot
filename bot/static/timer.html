<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rest Timer</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Sofia Pro', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: #191724;
            color: #F5F0F2;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 32px;
            padding: 24px;
        }
        .ring-wrap {
            position: relative;
            width: 240px;
            height: 240px;
        }
        .ring {
            transform: rotate(-90deg);
            width: 100%;
            height: 100%;
        }
        .ring-bg {
            fill: none;
            stroke: #2D2640;
            stroke-width: 6;
        }
        .ring-fg {
            fill: none;
            stroke: #D4A0B9;
            stroke-width: 6;
            stroke-linecap: round;
            transition: stroke-dashoffset 1s linear, stroke 250ms cubic-bezier(0.25, 0.1, 0.25, 1.0);
        }
        .time {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 56px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            letter-spacing: -1px;
            color: #F5F0F2;
        }
        .status {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #9B8FA0;
        }
        .btn {
            padding: 14px 48px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: opacity 250ms cubic-bezier(0.25, 0.1, 0.25, 1.0),
                        transform 250ms cubic-bezier(0.25, 0.1, 0.25, 1.0);
        }
        .btn:active { opacity: 0.7; transform: scale(0.98); }
        .btn-close {
            background: #2D2640;
            color: #F5F0F2;
        }
        .btn-done {
            background: #D4A0B9;
            color: #191724;
        }
        .done .ring-fg { stroke: #8BBF9F; }
        .done .time { color: #8BBF9F; }
        .done .status {
            color: #8BBF9F;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.05em;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="root">
        <div class="ring-wrap">
            <svg class="ring" viewBox="0 0 240 240">
                <circle class="ring-bg" cx="120" cy="120" r="112" />
                <circle class="ring-fg" id="fg" cx="120" cy="120" r="112" />
            </svg>
            <div class="time" id="time">0:00</div>
        </div>
        <div class="status" id="status">REST</div>
        <button class="btn btn-close" id="btn">Close</button>
    </div>
    <script>
        var tg = window.Telegram && window.Telegram.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        var params = new URLSearchParams(location.search);
        var total = Math.max(1, parseInt(params.get('s') || '120'));
        var left = total;

        var R = 112;
        var C = 2 * Math.PI * R;
        var fg = document.getElementById('fg');
        var timeEl = document.getElementById('time');
        var statusEl = document.getElementById('status');
        var btnEl = document.getElementById('btn');
        var rootEl = document.getElementById('root');

        fg.style.strokeDasharray = C;
        fg.style.strokeDashoffset = 0;

        // Unlock Web Audio immediately — page opens from user tap
        var ctx;
        try {
            ctx = new (window.AudioContext || window.webkitAudioContext)();
            var buf = ctx.createBuffer(1, 1, 22050);
            var src = ctx.createBufferSource();
            src.buffer = buf;
            src.connect(ctx.destination);
            src.start(0);
        } catch(e) {}

        function fmt(s) {
            return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
        }

        function render() {
            timeEl.textContent = fmt(left);
            var pct = (total - left) / total;
            fg.style.strokeDashoffset = C * (1 - pct);
        }

        function playAlarm() {
            if (!ctx) return;
            if (ctx.state === 'suspended') ctx.resume();

            var notes = [659, 784, 880, 988, 1047];
            for (var round = 0; round < 3; round++) {
                for (var i = 0; i < notes.length; i++) {
                    (function(f, t) {
                        var o = ctx.createOscillator();
                        var g = ctx.createGain();
                        o.connect(g);
                        g.connect(ctx.destination);
                        o.type = 'sine';
                        o.frequency.value = f;
                        g.gain.setValueAtTime(0.4, t);
                        g.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
                        o.start(t);
                        o.stop(t + 0.1);
                    })(notes[i], ctx.currentTime + round * 0.9 + i * 0.12);
                }
            }
        }

        function vibrate() {
            if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 400]);
        }

        function finish() {
            rootEl.classList.add('done');
            timeEl.textContent = '0:00';
            statusEl.textContent = "TIME'S UP";
            fg.style.strokeDashoffset = C;
            btnEl.textContent = 'Close';
            btnEl.className = 'btn btn-done';

            playAlarm();
            vibrate();

            var count = 0;
            var iv = setInterval(function() {
                count++;
                if (count >= 4) { clearInterval(iv); return; }
                playAlarm();
                vibrate();
            }, 2500);
        }

        btnEl.addEventListener('click', function() {
            if (tg) tg.close();
            else window.close();
        });

        render();

        var timer = setInterval(function() {
            left--;
            if (left <= 0) {
                clearInterval(timer);
                left = 0;
                render();
                finish();
                return;
            }
            render();
        }, 1000);
    </script>
</body>
</html>
